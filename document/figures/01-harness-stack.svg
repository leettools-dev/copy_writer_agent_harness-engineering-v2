<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <style>
    .layer { fill: #f4f7fb; stroke: #2b6cb0; stroke-width:2 }
    .band { fill: #ffffff; stroke: #cbd5e1; }
    .title { font-family: Inter, Arial, sans-serif; font-size:22px; fill:#0f172a; font-weight:600 }
    .label { font-family: Inter, Arial, sans-serif; font-size:16px; fill:#0f172a }
    .note { font-family: Inter, Arial, sans-serif; font-size:13px; fill:#334155 }
    .bullet { font-family: Inter, Arial, sans-serif; font-size:12px; fill:#475569 }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="40" class="title">LLM Harness Stack — Development → Runtime → Ops</text>
  <text x="40" y="66" class="note">Conceptual layered view: prioritize SDK-first integration at the Developer layer; standards-first trace schemas accelerate Ops adoption.</text>

  <!-- Developer layer -->
  <rect x="60" y="100" width="1280" height="150" rx="12" class="band" />
  <text x="80" y="140" class="label">Developer frameworks & SDKs (Distribution)</text>
  <text x="80" y="165" class="bullet">• LangChain, LlamaIndex — agent primitives, prompt/config management</text>
  <text x="80" y="185" class="bullet">• Callback hooks, plugins: primary distribution channel for harness tools</text>

  <!-- Runtime layer -->
  <rect x="60" y="270" width="1280" height="150" rx="12" class="band" />
  <text x="80" y="310" class="label">Runtime & Orchestration (Execution)</text>
  <text x="80" y="335" class="bullet">• Orchestration runtimes, tool-calling sandboxes, model routing</text>
  <text x="80" y="355" class="bullet">• Vector DBs / memory, long-running tasks, cost & fallback routing</text>

  <!-- Ops layer -->
  <rect x="60" y="440" width="1280" height="150" rx="12" class="band" />
  <text x="80" y="480" class="label">Ops: Observability, Eval & Governance (Operational Controls)</text>
  <text x="80" y="505" class="bullet">• Trace schemas, telemetry, private eval registries, audit logs</text>
  <text x="80" y="525" class="bullet">• RBAC, data residency, compliance & SLOs</text>

  <!-- Cross-cutting connectors -->
  <g fill="#0f172a">
    <text x="1020" y="135" class="note">Cross-cutting services:</text>
    <text x="1020" y="155" class="bullet">• Vector DBs (Pinecone, Chroma, Milvus)</text>
    <text x="1020" y="175" class="bullet">• Policy engines / guardrails</text>
    <text x="1020" y="195" class="bullet">• HITL / review flows</text>
  </g>

  <!-- Footer / source -->
  <text x="40" y="680" class="note">Source: compiled evidence and taxonomy from workspace references (LangChain, LlamaIndex, Langfuse, OpenAI Evals, Pinecone). Diagram is conceptual and intended to show insertion points for newcomer wedges.</text>
</svg>
