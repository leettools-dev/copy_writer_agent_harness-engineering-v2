<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="60" width="1260" height="120" fill="#eaf2ff" stroke="#cfe3ff"/>
    <text x="100" y="95" font-size="20" fill="#0f172a">Developer frameworks & SDKs</text>
    <text x="100" y="125" font-size="14" fill="#374151">Agent frameworks, SDKs, composition primitives (LangChain, LlamaIndex)</text>

    <rect x="70" y="200" width="1260" height="140" fill="#ecfdf5" stroke="#d1fae5"/>
    <text x="100" y="235" font-size="20" fill="#064e3b">Runtime & Orchestration</text>
    <text x="100" y="265" font-size="14" fill="#065f46">Orchestration runtimes, tool calling, memory management, routing, model selection</text>

    <rect x="70" y="360" width="1260" height="120" fill="#fff1f2" stroke="#ffe4e6"/>
    <text x="100" y="395" font-size="20" fill="#7f1d1d">Ops, Observability & Governance</text>
    <text x="100" y="425" font-size="14" fill="#92400e">Eval frameworks, tracing, audit, policy enforcement, HITL workflows</text>

    <g>
      <rect x="250" y="20" width="900" height="30" fill="#fff7ed" stroke="#ffedd5"/>
      <text x="260" y="40" font-size="14" fill="#92400e">Cross-cutting services: vector DBs, model providers, policy engines, HITL systems</text>
    </g>

    <text x="100" y="475" font-size="12" fill="#6b7280">Insight: Developer frameworks are strong distribution channels; vendor-neutral trace schema and first-class SDK integrations are high-leverage insertion points for startups.</text>
  </g>
</svg>