<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .title { font: bold 26px sans-serif; fill:#111 }
    .subtitle { font: 14px sans-serif; fill:#333 }
    .layer-title { font: 18px sans-serif; fill:#fff }
    .layer-label { font: 13px sans-serif; fill:#fff }
    .note { font: 12px sans-serif; fill:#444 }
    .accent { fill:#0b5fff }
    .layer { rx:10; ry:10 }
  </style>

  <!-- Header -->
  <text x="40" y="48" class="title">LLM Harness Engineering — Stages & Layers</text>
  <text x="40" y="74" class="subtitle">A conceptual layered view showing where harness tooling sits (developer → runtime → ops).</text>

  <!-- Layers (stacked vertically) -->
  <!-- Top: Applications -->
  <rect x="120" y="110" width="1160" height="90" class="layer" fill="#1f77b4" opacity="0.95"/>
  <text x="140" y="160" class="layer-title">Applications & Vertical Solutions</text>
  <text x="140" y="185" class="layer-label">Customer-facing products: chatbots, copilots, workflows — buyers of harness tooling</text>

  <!-- Orchestration & Runtime -->
  <rect x="120" y="215" width="1160" height="90" class="layer" fill="#2ca02c" opacity="0.95"/>
  <text x="140" y="265" class="layer-title">Orchestration & Runtime</text>
  <text x="140" y="290" class="layer-label">Agent frameworks, workflow engines, tool-calling, routing (e.g., LangChain)</text>

  <!-- Retrieval & Memory -->
  <rect x="120" y="320" width="1160" height="90" class="layer" fill="#ff7f0e" opacity="0.95"/>
  <text x="140" y="370" class="layer-title">Retrieval, Indexing & Memory</text>
  <text x="140" y="395" class="layer-label">RAG orchestration, vector DBs, memory stores (Pinecone, Chroma, LlamaIndex)</text>

  <!-- Observability & Eval -->
  <rect x="120" y="425" width="1160" height="90" class="layer" fill="#d62728" opacity="0.95"/>
  <text x="140" y="475" class="layer-title">Observability, Tracing & Eval</text>
  <text x="140" y="500" class="layer-label">Tracing, continuous evals, CI/CI integration (Langfuse, LangSmith, OpenAI Evals, Promptfoo)</text>

  <!-- Governance & Security -->
  <rect x="120" y="530" width="1160" height="90" class="layer" fill="#9467bd" opacity="0.95"/>
  <text x="140" y="580" class="layer-title">Governance, Policy & Security</text>
  <text x="140" y="605" class="layer-label">Audit trails, RBAC, data residency, redaction, policy engines</text>

  <!-- Bottom: Model & Compute -->
  <rect x="120" y="635" width="1160" height="90" class="layer" fill="#8c564b" opacity="0.95"/>
  <text x="140" y="685" class="layer-title">Model & Compute</text>
  <text x="140" y="710" class="layer-label">Model providers & inference (OpenAI, Anthropic, Hugging Face) — execution substrate</text>

  <!-- Cross-cutting services box -->
  <rect x="20" y="760" width="1360" height="100" fill="#f7f7f7" stroke="#ddd" rx="8" ry="8"/>
  <text x="40" y="788" class="note">Cross-cutting services (connectors & integrations): Vector DBs, OpenTelemetry, CI/QA tooling, HITL UIs, sandboxing — these connect across layers and are common integration points for harness products.</text>

  <!-- Insight box on right -->
  <rect x="40" y="110" width="60" height="620" fill="none"/>
  <g transform="translate(10,110)">
    <rect x="1180" y="20" width="180" height="180" fill="#fff8c6" stroke="#f0d56a" rx="8" ry="8"/>
    <text x="1200" y="50" class="note" style="font-weight:bold;">Key insight</text>
    <text x="1200" y="74" class="note">Startup wedges most often</text>
    <text x="1200" y="92" class="note">succeed at orchestration,</text>
    <text x="1200" y="110" class="note">observability, or retrieval</text>
    <text x="1200" y="128" class="note">because they are highly</text>
    <text x="1200" y="146" class="note">composable and integration-driven.</text>
  </g>

  <!-- Footer / source -->
  <text x="40" y="880" class="note">Source: Compiled from vendor docs, OSS captures, and market research (LangChain, Langfuse, LlamaIndex, Pinecone, OpenAI Evals). Conceptual figure created for this report.</text>
</svg>
