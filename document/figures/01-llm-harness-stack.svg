<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <style>
    .layer { fill:#f5f7fb; stroke:#cfd8e9; stroke-width:2 }
    .label { font: bold 20px sans-serif; fill:#102a43 }
    .summary { font: 14px sans-serif; fill:#334e68 }
    .connector { stroke:#8aa0c8; stroke-width:2 }
  </style>

  <!-- Title -->
  <text x="40" y="40" class="label" style="font-size:24px">LLM Harness Stack — Development → Runtime → Ops</text>
  <text x="40" y="66" class="summary">Conceptual layered view showing where harness tooling integrates: frameworks, runtime, and operational controls.</text>

  <!-- Developer layer -->
  <rect x="40" y="100" width="1320" height="140" rx="8" class="layer"/>
  <text x="60" y="140" class="label">Developer frameworks & SDKs</text>
  <text x="60" y="168" class="summary">LangChain, LlamaIndex — agent primitives, prompt/config management, distribution hooks</text>

  <!-- Runtime layer -->
  <rect x="40" y="260" width="1320" height="180" rx="8" class="layer"/>
  <text x="60" y="300" class="label">Runtime & Orchestration</text>
  <text x="60" y="336" class="summary">Orchestration runtimes, tool-calling sandboxes, memory & retrieval, model routing, fallback logic</text>

  <!-- Ops layer -->
  <rect x="40" y="460" width="1320" height="140" rx="8" class="layer"/>
  <text x="60" y="500" class="label">Observability, Evals & Governance</text>
  <text x="60" y="528" class="summary">Tracing, continuous evals, guardrails, audit, compliance (Langfuse, LangSmith, OpenAI Evals)</text>

  <!-- Cross-cutting icons -->
  <g>
    <rect x="980" y="120" width="340" height="120" rx="6" fill="#ffffff" stroke="#d1e3ff"/>
    <text x="990" y="148" style="font:16px sans-serif; fill:#0b2545">Model Providers</text>
    <text x="990" y="170" style="font:13px sans-serif; fill:#264653">OpenAI, Anthropic, Cohere, Llama-based</text>

    <rect x="980" y="320" width="340" height="120" rx="6" fill="#ffffff" stroke="#d1e3ff"/>
    <text x="990" y="348" style="font:16px sans-serif; fill:#0b2545">Vector & Indexing Infra</text>
    <text x="990" y="370" style="font:13px sans-serif; fill:#264653">Pinecone, Chroma, Milvus, Weaviate</text>
  </g>

  <!-- Connectors -->
  <line x1="900" y1="160" x2="980" y2="160" class="connector"/>
  <line x1="900" y1="360" x2="980" y2="360" class="connector"/>

  <!-- Insight box -->
  <rect x="40" y="620" width="1320" height="60" rx="6" fill="#e8f1ff" stroke="#c6ddff"/>
  <text x="60" y="652" style="font:14px sans-serif; fill:#0b2545">Insight: Startups can wedge by (a) SDK-first integrations into developer frameworks, (b) standards for trace/eval schemas, or (c) verticalized RAG and governance bundles for enterprise buyers.</text>
</svg>
